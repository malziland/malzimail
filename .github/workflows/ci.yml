# Continuous Integration: runs on every push and pull request.
# Becomes active as soon as this repository is pushed to GitHub.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: jobs only read the checkout. gitleaks needs the token to
# read PR metadata (see below) but no write scope. Pinning this in the workflow
# means it no longer depends on the repository's default-permissions setting.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Third-party and first-party actions pinned to immutable commit SHAs
      # (mutable major tags can be re-pointed). Dependabot keeps the SHAs current
      # and the trailing comment records the human-readable version.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        # npm install (nicht npm ci): einige Dev-Abhängigkeiten bringen plattform-
        # spezifische optionale Native-Bindings mit (z. B. @emnapi/*), die eine auf
        # macOS erzeugte Lockfile für Linux nicht festhält — das strikte npm ci würde
        # daran scheitern. npm install löst die Plattform-Deps auf dem Runner selbst auf.
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      # Real gate (vitest.config.js): lines/statements/functions >= 90, branches >= 80.
      - name: Tests + Coverage (Gate 90/90/90/80)
        run: npm run test:coverage

      # Structural accessibility rules (axe-core in jsdom); the color-contrast
      # rule needs real rendering and is covered by the design tokens instead.
      - name: Accessibility checks (axe-core)
        run: npm run test:a11y

      # Scan the dependencies that actually ship in the Worker. Build/test tools
      # (esbuild, wrangler, vitest) are kept current via Dependabot instead, so
      # a dev-tool advisory does not block the pipeline.
      - name: Audit shipped dependencies
        run: npm audit --omit=dev --audit-level=high

  # Secret scanning: fail the build if any credential pattern is committed
  # (full history checkout so historical leaks are caught too).
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          # Required since gitleaks-action v3 for scanning pull requests (reads PR
          # metadata). The automatic token is read-only here (permissions above);
          # without it the job fails on every PR — which blocked all Dependabot PRs.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
